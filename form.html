<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/bootstrap.min.css"/>
    <title>Form style</title>
</head>
<body>
    <form class="m-4 main-form">
        <!-- <input type="text" class="form-control"> -->

        <div class="form-group">
            <label for="username">Name</label>
            <input type="text" id="username" class="form-control" value="John">
            <small class="form-text" text-muted>Hint</small>
        </div>
        <br>
        <div class="form-floating">
            <input type="password" id="pass" placeholder="Password" class="form-control" >
            <label for="pass">Password</label>
        </div>
        <br>
        <label for="selector">Select from the list</label>
        <select id="serector" class="form-control">
            <option value="1">Option 1</option>
            <option value="2">Option 2</option>
            <option value="3">Option 3</option>
        </select>
        <br>
        <div class="form-group m-1">
            <input type="radio" class="form-check-input" id="male" name="male">
        <label for="male">Men</label>
        <input type="radio" class="form-check-input" id="female" name="male">
        <label for="female">Women</label>
        </div>
        <div class="form-switch m-1">
            <input type="checkbox" id="rights-2" class="form-check-input" >
            <label for="rights-2">Click</label>
        </div>
        <div class="form-group m-1">
            <input type="checkbox" id="rights" class="form-check-input" >
            <label for="rights">Click</label>
        </div>
        <br>
        <div class="input-group">
            <div class="input-group-text">
                <input type="checkbox" class="form-check-input">
                <label for="">Click</label>
            </div>
            <input type="email" class="form-control" placeholder="Email">
            <button type="button" class="btn btn-info">Click enter</button>
        </div>
        <button type="button" class="m-3 btn btn-success">Send</button>
    </form>
</body>
</html>
